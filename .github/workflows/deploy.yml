name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate OG images
        run: |
          pip install Pillow
          python scripts/gen_og.py

      - name: Quality gate
        run: npm run check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Upload sitemap for IndexNow
        uses: actions/upload-artifact@v4
        with:
          name: sitemap
          path: dist/sitemap-0.xml
          retention-days: 1

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    name: Ping IndexNow
    needs: deploy
    runs-on: ubuntu-latest
    # IndexNow submission is best-effort; a network hiccup on the Bing side
    # must not mark the deploy as failed.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch sitemap artifact
        uses: actions/download-artifact@v4
        with:
          name: sitemap
          path: dist/
      - name: Submit to IndexNow
        run: node scripts/ping-indexnow.mjs
